<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; }
  #chartdiv { width: 100vw; height: 100vh; background: transparent; }
</style>
</head>
<body>
<div id="chartdiv"></div>
<script src="https://cdn.amcharts.com/lib/5/index.js"></script>
<script src="https://cdn.amcharts.com/lib/5/map.js"></script>
<script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
<script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
<script>
am5.ready(function() {
  var root = am5.Root.new("chartdiv");
  root.setThemes([am5themes_Animated.new(root)]);

  var chart = root.container.children.push(am5map.MapChart.new(root, {
    panX: "rotateX",
    panY: "rotateY",
    projection: am5map.geoOrthographic(),
    paddingBottom: 0, paddingTop: 0, paddingLeft: 0, paddingRight: 0,
    rotationX: -78,
    rotationY: -20,
    minZoomLevel: 0.9,
    maxZoomLevel: 0.9,
    zoomLevel: 0.9
  }));

  var backgroundSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {}));
  backgroundSeries.mapPolygons.template.setAll({
    fill: am5.color(0x060612),
    fillOpacity: 1,
    strokeOpacity: 0
  });
  backgroundSeries.data.push({ geometry: am5map.getGeoRectangle(90, 180, -90, -180) });

  var graticuleSeries = chart.series.push(am5map.GraticuleSeries.new(root, {}));
  graticuleSeries.mapLines.template.setAll({
    stroke: am5.color(0xffffff),
    strokeOpacity: 0.05,
    strokeWidth: 0.5
  });

  var polygonSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {
    geoJSON: am5geodata_worldLow
  }));
  polygonSeries.mapPolygons.template.setAll({
    tooltipText: "{name}",
    toggleKey: "active",
    interactive: true,
    fill: am5.color(0x111128),
    fillOpacity: 0.9,
    stroke: am5.color(0xffffff),
    strokeWidth: 0.4,
    strokeOpacity: 0.12
  });
  polygonSeries.mapPolygons.template.states.create("hover", {
    fill: am5.color(0x3d2060),
    stroke: am5.color(0x8B5CF6),
    strokeWidth: 1,
    strokeOpacity: 0.7
  });
  polygonSeries.mapPolygons.template.states.create("active", {
    fill: am5.color(0x5b21b6),
    stroke: am5.color(0x8B5CF6),
    strokeWidth: 1.5,
    strokeOpacity: 1
  });

  polygonSeries.events.on("datavalidated", function() {
    polygonSeries.mapPolygons.each(function(polygon) {
      var d = polygon.dataItem && polygon.dataItem.dataContext;
      if (d && d.id === "IN") {
        polygon.setAll({
          fill: am5.color(0x3b0764),
          fillOpacity: 0.95,
          stroke: am5.color(0x8B5CF6),
          strokeWidth: 1.5,
          strokeOpacity: 1
        });
      }
    });
  });

  var pointSeries = chart.series.push(am5map.MapPointSeries.new(root, {}));
  var cities = [
    { name: "Lucknow", lng: 80.9462, lat: 26.8467, p: true },
    { name: "Delhi", lng: 77.2090, lat: 28.6139, p: true },
    { name: "Mumbai", lng: 72.8777, lat: 19.0760, p: true },
    { name: "Bangalore", lng: 77.5946, lat: 12.9716, p: true },
    { name: "Chennai", lng: 80.2707, lat: 13.0827, p: true },
    { name: "Hyderabad", lng: 78.4867, lat: 17.3850, p: true },
    { name: "Kolkata", lng: 88.3639, lat: 22.5726, p: true },
    { name: "Pune", lng: 73.8567, lat: 18.5204, p: true },
    { name: "Dubai", lng: 55.2708, lat: 25.2048, p: false },
    { name: "Singapore", lng: 103.8198, lat: 1.3521, p: false },
    { name: "London", lng: -0.1278, lat: 51.5074, p: false },
    { name: "New York", lng: -74.0060, lat: 40.7128, p: false },
    { name: "Tokyo", lng: 139.6503, lat: 35.6762, p: false },
    { name: "Sydney", lng: 151.2093, lat: -33.8688, p: false }
  ];

  cities.forEach(function(city) {
    pointSeries.data.push({
      geometry: { type: "Point", coordinates: [city.lng, city.lat] },
      name: city.name,
      primary: city.p
    });
  });

  pointSeries.bullets.push(function(r, s, dataItem) {
    var isPrimary = dataItem.dataContext.primary;
    var circle = am5.Circle.new(root, {
      radius: isPrimary ? 5 : 3,
      fill: am5.color(0x8B5CF6),
      fillOpacity: isPrimary ? 1 : 0.5,
      stroke: am5.color(0xd8b4fe),
      strokeWidth: isPrimary ? 1.5 : 0.8,
      strokeOpacity: 0.8,
      tooltipText: "{name}"
    });
    circle.animate({
      key: "scale", from: 1, to: isPrimary ? 2.2 : 1.6,
      duration: isPrimary ? 1500 : 2000,
      loops: Infinity,
      easing: am5.ease.yoyo(am5.ease.sinOut)
    });
    circle.animate({
      key: "fillOpacity", from: isPrimary ? 1 : 0.5, to: 0.2,
      duration: isPrimary ? 1500 : 2000,
      loops: Infinity,
      easing: am5.ease.yoyo(am5.ease.sinOut)
    });
    return am5.Bullet.new(root, { sprite: circle });
  });

  // Rotation logic — using animationStopped properly
  var rotationAnimation = null;

  function startRotation() {
    var fromX = chart.get("rotationX") || 0;
    rotationAnimation = chart.animate({
      key: "rotationX",
      from: fromX,
      to: fromX + 360,
      duration: 30000,
      loops: Infinity
    });
  }

  function stopRotation() {
    if (rotationAnimation) {
      rotationAnimation.stop();
      rotationAnimation = null;
    }
  }

  function smoothReturnAndSpin() {
    // Smoothly return Y tilt to default -20
    chart.animate({
      key: "rotationY",
      to: -20,
      duration: 600,
      easing: am5.ease.out(am5.ease.cubic)
    });
    // Start X rotation immediately — no delay
    startRotation();
  }

  chart.events.on("panstarted", function() {
    stopRotation();
  });

  chart.events.on("panended", function() {
    smoothReturnAndSpin();
  });

  // Start on load
  startRotation();
  chart.appear(1000, 100);
});
</script>
</body>
</html>
